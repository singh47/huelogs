<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hue Logs Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
</head>

<body>
    <div class="container py-4">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0">
                <i class="bi bi-terminal-fill me-2"></i> Hue Logs Dashboard
            </h1>
            <div class="btn-group">
                <button id="theme-toggle" class="btn btn-outline-secondary" title="Toggle Theme">
                    <i class="bi bi-moon-fill"></i>
                </button>
                <button id="fullscreen-toggle" class="btn btn-outline-secondary" title="Toggle Fullscreen">
                    <i class="bi bi-fullscreen"></i>
                </button>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-secondary" title="Logout">
                    <i class="bi bi-box-arrow-right"></i>
                </a>
            </div>
        </div>
        <!-- Controls Panel -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="d-flex flex-wrap align-items-center gap-2">
                    <div class="flex-grow-1" style="min-width: 250px; max-width: 500px;">
                        <input type="text" id="search-input" class="form-control" placeholder="Search logs...">
                    </div>
                    <button id="search-button" class="btn btn-primary" title="Search">
                        <i class="bi bi-search"></i>
                    </button>
                    <button id="clear-search" class="btn btn-secondary" title="Clear Search">
                        <i class="bi bi-x-circle"></i>
                    </button>
                    <button id="export-logs" class="btn btn-success" title="Export Logs">
                        <i class="bi bi-download"></i>
                    </button>
                    <button id="auto-refresh-toggle" class="btn btn-warning" title="Toggle Auto Refresh">
                        <i class="bi bi-arrow-repeat"></i>
                    </button>
                    <div class="ms-auto text-muted small d-flex align-items-center">
                        <i class="bi bi-circle-fill text-success me-1"></i>Connected • 
                        <span id="log-count" class="ms-1">0</span> entries
                    </div>
                </div>
            </div>
        </div>


        <!-- Log Feed -->
        <div class="card">
            <div class="card-body p-0">
                <div id="log-container" class="list-group list-group-flush">
                    <!-- Example log entry structure -->
                    <!--
                    <div class="list-group-item px-3 py-2">
                        [WebApp][2025-04-28 06:42:08] User logged in - test log
                    </div>
                    -->
                </div>
            </div>
        </div>
    </div>


    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>

    
    <script>
        // Theme toggle functionality
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const icon = themeToggle.querySelector('i');
            icon.classList.toggle('bi-moon-fill');
            icon.classList.toggle('bi-sun-fill');
        });

        // Fullscreen toggle functionality
        const fullscreenToggle = document.getElementById('fullscreen-toggle');
        fullscreenToggle.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenToggle.querySelector('i').classList.replace('bi-fullscreen', 'bi-fullscreen-exit');
            } else {
                document.exitFullscreen();
                fullscreenToggle.querySelector('i').classList.replace('bi-fullscreen-exit', 'bi-fullscreen');
            }
        });

        // Quick filters functionality
        document.querySelectorAll('.filter-badge').forEach(badge => {
            badge.addEventListener('click', () => {
                const filterText = badge.dataset.filter;
                document.getElementById('search-input').value = filterText;
                // Trigger search...
            });
        });

        // Export functionality
        document.getElementById('export-logs').addEventListener('click', () => {
            const logContent = document.getElementById('log-container').innerText;
            const blob = new Blob([logContent], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'hue-logs-export.txt';
            a.click();
            window.URL.revokeObjectURL(url);
        });
    </script>

</body>
</html>
