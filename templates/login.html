<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>huelogs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, "Courier New", monospace;
      font-size: 13px;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: 328px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 28px 24px 24px;
    }
    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #e6edf3;
      margin-bottom: 20px;
    }
    .error {
      background: rgba(248,81,73,.12);
      color: #f85149;
      border: 1px solid rgba(248,81,73,.3);
      border-radius: 5px;
      padding: 8px 10px;
      font-size: 11px;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: #8b949e;
      margin-bottom: 6px;
    }
    input[type="password"] {
      display: block;
      width: 100%;
      height: 34px;
      padding: 0 10px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 13px;
      font-family: inherit;
      letter-spacing: 0.14em;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="password"]::placeholder { color: #484f58; letter-spacing: normal; }
    input[type="password"]:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88,166,255,.15);
    }
    button {
      display: block;
      width: 100%;
      height: 34px;
      background: #238636;
      color: #fff;
      border: 1px solid rgba(240,246,252,.1);
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover  { background: #2ea043; }
    button:active { background: #238636; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">huelogs</div>
    {{ if .Error }}
    <div class="error">{{ .Error }}</div>
    {{ end }}
    <form method="POST" action="/login">
      <label for="api_key">API key</label>
      <input type="password" id="api_key" name="api_key" placeholder="••••••••••••••••" required autofocus>
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
